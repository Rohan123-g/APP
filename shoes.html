<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop - Shoes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f1f3f6;
}

.header {
    background-color: #222;
    color: white;
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
}

.container {
    display: flex;
    gap: 40px;
    padding: 40px;
    max-width: 1100px;
    margin: auto;
    background: #fff;
    border-radius: 8px;
}

.image-box {
    flex: 1;
    text-align: center;
}

.image-box img {
    width: 100%;
    max-width: 350px;
    border-radius: 10px;
    transition: 0.3s;
}

.image-box img:hover {
    transform: scale(1.05);
}

.details {
    flex: 2;
}

.title {
    font-size: 24px;
    font-weight: 600;
}

.brand {
    color: #777;
    margin: 5px 0 15px;
}

.price {
    font-size: 28px;
    color: #388e3c;
    font-weight: bold;
}

.old-price {
    text-decoration: line-through;
    color: #999;
    margin-left: 10px;
    font-size: 18px;
}

.discount {
    color: #388e3c;
    font-weight: bold;
    margin-left: 10px;
}

.rating {
    background: #388e3c;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 10px;
}

.size-section {
    margin-top: 20px;
}

.size-section button {
    padding: 10px 15px;
    margin: 5px;
    border: 1px solid #ccc;
    background: white;
    cursor: pointer;
    border-radius: 4px;
    transition: 0.3s;
}

.size-section button:hover {
    border-color: #222;
    color: #222;
}

.buttons {
    margin-top: 25px;
}

.btn {
    padding: 14px 25px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    margin-right: 10px;
    border-radius: 5px;
}

.cart {
    background-color: #ff9f00;
    color: white;
}

.buy {
    background-color: #fb641b;
    color: white;
}

.desc {
    margin-top: 30px;
    line-height: 1.6;
    color: #444;
}

@media(max-width: 768px) {
    .container {
        flex-direction: column;
        padding: 20px;
    }
}
</style>

</head>

<body>

<div class="header">My Shop</div>

<div class="container">

```
<!-- Image -->
<div class="image-box">
    <img src="s1.jpg">
</div>

<!-- Details -->
<div class="details">
    <div class="title">Men's Stylish Running Shoes</div>
    <div class="brand">by Nike</div>

    <div>
        <span class="price">₹1,999</span>
        <span class="old-price">₹3,999</span>
        <span class="discount">50% off</span>
    </div>

    <div class="rating">4.3 ★</div>

    <!-- Size -->
    <div class="size-section">
        <p><b>Select Size:</b></p>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>10</button>
    </div>

    <!-- Buttons -->
    <div class="buttons">
        <button class="btn cart">Add to Cart</button>
        <button class="btn buy">Buy Now</button>
    </div>

    <!-- Description -->
    <div class="desc">
        <h3>Product Description</h3>
        <p>
            Lightweight and comfortable running shoes designed for daily wear.
            Breathable material ensures airflow, while durable sole provides
            excellent grip and stability.
        </p>
    </div>

</div>
```

</div>

</body>
</html>
